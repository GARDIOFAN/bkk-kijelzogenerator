<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <title>BKK Roblox Generátor</title>
    <link href="https://fonts.googleapis.com/css2?family=VT323&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root { --bkk-blue: #002d5a; --bkk-l-blue: #00b0ea; --bkk-amber: #ff9500; }
        body { background: #1a1a1a; color: white; font-family: 'Inter', sans-serif; display: flex; flex-direction: column; align-items: center; padding: 20px; }

        /* KÜLSŐ LED */
        #display-external {
            width: 1200px; height: 200px; background: #000; position: relative;
            display: flex; align-items: center; padding: 0 30px; overflow: hidden;
        }
        .led-overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-image: radial-gradient(rgba(0,0,0,0.6) 40%, transparent 40%); background-size: 4px 4px; z-index: 10; pointer-events: none; }
        .led-line { color: var(--bkk-amber); font-family: 'VT323'; font-size: 140px; border: 6px solid var(--bkk-amber); padding: 0 20px; margin-right: 30px; height: 150px; display: flex; align-items: center; justify-content: center; min-width: 140px; flex-shrink: 0; }
        .led-text { color: var(--bkk-amber); font-family: 'VT323'; font-size: 95px; text-transform: uppercase; white-space: pre; flex-grow: 1; }

        /* BELSŐ TFT */
        #display-internal { width: 900px; height: 500px; background: var(--bkk-blue); position: relative; display: none; }
        .tft-header { height: 90px; background: #0081ba; display: flex; align-items: center; padding: 0 25px; gap: 20px; }
        .tft-badge { background: var(--bkk-l-blue); color: white; padding: 5px 20px; border-radius: 8px; font-weight: 800; font-size: 35px; }
        .tft-dest { font-size: 36px; font-weight: 600; flex-grow: 1; text-transform: uppercase; }

        /* JELENLEGI MEGÁLLÓ NÉZET */
        #at-stop-view { display: none; padding: 45px; flex-direction: column; }
        .current-stop-name { font-size: 65px; font-weight: 800; margin-bottom: 25px; border-bottom: 5px solid var(--bkk-l-blue); padding-bottom: 15px; text-transform: uppercase; }
        .transfer-grid { display: flex; flex-wrap: wrap; gap: 15px; }
        .transfer-box { padding: 10px 22px; border-radius: 8px; font-weight: 800; font-size: 32px; color: white; }

        /* MEGÁLLÓK KIJELZÉSE (LISTA) */
        .tft-content { padding: 40px 80px; display: none; gap: 40px; }
        .tft-line-graphic { width: 14px; background: var(--bkk-l-blue); border-radius: 7px; height: 320px; position: relative; }
        .dot { width: 28px; height: 28px; background: white; border-radius: 50%; position: absolute; left: -7px; }
        .stop-list { display: flex; flex-direction: column; justify-content: space-between; height: 340px; }
        .stop-item { font-size: 32px; font-weight: 500; text-transform: uppercase; }
        .stop-item.active { font-size: 42px; font-weight: 800; }

        /* UI */
        .ui { margin-top: 25px; background: #333; padding: 25px; border-radius: 15px; width: 700px; display: grid; gap: 15px; }
        input, textarea, select { padding: 12px; background: #444; border: 1px solid #555; color: white; border-radius: 6px; font-size: 16px; width: 100%; box-sizing: border-box; }
        button { padding: 18px; background: #28a745; border: none; color: white; font-weight: bold; cursor: pointer; border-radius: 8px; font-size: 18px; }
        label { font-size: 14px; color: #bbb; font-weight: bold; margin-bottom: -5px; }
    </style>
</head>
<body>

    <div id="display-external">
        <div class="led-overlay"></div>
        <div id="led-line-res" class="led-line">169E</div>
        <div id="led-text-res" class="led-text">PÉCEL, KUN JÓZSEF UTCA</div>
    </div>

    <div id="display-internal">
        <div class="tft-header">
            <div id="tft-line-res" class="tft-badge">169E</div>
            <div id="tft-dest-res" class="tft-dest">PÉCEL, KUN JÓZSEF UTCA</div>
        </div>
        
        <div id="list-view" class="tft-content">
            <div class="tft-line-graphic">
                <div class="dot" style="top:0"></div><div class="dot" style="top:33%"></div>
                <div class="dot" style="top:66%"></div><div class="dot" style="top:100%"></div>
            </div>
            <div class="stop-list">
                <div id="s1-res" class="stop-item active">JELENLEGI MEGÁLLÓ</div>
                <div id="s2-res" class="stop-item">MEGÁLLÓ 2</div>
                <div id="s3-res" class="stop-item">MEGÁLLÓ 3</div>
                <div id="s4-res" class="stop-item">MEGÁLLÓ 4</div>
            </div>
        </div>

        <div id="at-stop-view">
            <div id="curr-stop-res" class="current-stop-name">JELENLEGI MEGÁLLÓ</div>
            <div style="font-size: 24px; color: #ccc; margin-bottom: 10px;">Átszállási lehetőségek:</div>
            <div id="transfer-res" class="transfer-grid"></div>
        </div>
    </div>

    <div class="ui">
        <label>MÓD VÁLASZTÁSA</label>
        <select id="mode-select">
            <option value="ext">Külső LED (Hosszú)</option>
            <option value="int">Megállók kijelzése (Lista)</option>
            <option value="stop">Jelenlegi megálló (Átszállások)</option>
        </select>

        <label>JÁRAT ÉS ÚTICÉL</label>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="in-line" placeholder="Járat" value="169E" style="width:100px">
            <input type="text" id="in-dest" placeholder="Végállomás (Külsőre is ez megy)" value="PÉCEL, KUN JÓZSEF UTCA">
        </div>

        <div id="stop-input-container" style="display:none">
            <label>JELENLEGI MEGÁLLÓ</label>
            <input type="text" id="in-s1" placeholder="Írd ide hol áll a busz..." value="JELENLEGI MEGÁLLÓ">
        </div>

        <div id="list-only" style="display:none">
            <label>KÖVETKEZŐ MEGÁLLÓK (Lista nézethez)</label>
            <input type="text" id="in-s2" placeholder="2. megálló" value="MEGÁLLÓ 2" style="margin-bottom:5px">
            <input type="text" id="in-s3" placeholder="3. megálló" value="MEGÁLLÓ 3" style="margin-bottom:5px">
            <input type="text" id="in-s4" placeholder="4. megálló" value="MEGÁLLÓ 4">
        </div>

        <div id="stop-only" style="display:none">
            <label>ÁTSZÁLLÁSOK (Pl: M2:red, 7:orange)</label>
            <textarea id="in-transfers" placeholder="M2:red, 161:blue, 956:black"></textarea>
        </div>

        <button onclick="save()">MENTÉS PNG-KÉNT</button>
    </div>

    <script>
        const mode = document.getElementById('mode-select');
        const extDiv = document.getElementById('display-external');
        const intDiv = document.getElementById('display-internal');
        const listView = document.getElementById('list-view');
        const stopView = document.getElementById('at-stop-view');
        const stopInputCont = document.getElementById('stop-input-container');

        mode.onchange = () => {
            // Táblák váltása
            extDiv.style.display = mode.value === 'ext' ? 'flex' : 'none';
            intDiv.style.display = mode.value !== 'ext' ? 'block' : 'none';
            listView.style.display = mode.value === 'int' ? 'flex' : 'none';
            stopView.style.display = mode.value === 'stop' ? 'flex' : 'none';
            
            // UI elemek elrejtése/megjelenítése
            stopInputCont.style.display = mode.value !== 'ext' ? 'block' : 'none';
            document.getElementById('list-only').style.display = mode.value === 'int' ? 'block' : 'none';
            document.getElementById('stop-only').style.display = mode.value === 'stop' ? 'block' : 'none';
        };

        document.getElementById('in-line').oninput = (e) => {
            const v = e.target.value.toUpperCase();
            document.getElementById('led-line-res').innerText = v;
            document.getElementById('tft-line-res').innerText = v;
        };

        document.getElementById('in-dest').oninput = (e) => {
            const v = e.target.value.toUpperCase();
            document.getElementById('led-text-res').innerText = v;
            document.getElementById('tft-dest-res').innerText = v;
        };

        document.getElementById('in-s1').oninput = (e) => {
            const v = e.target.value.toUpperCase();
            document.getElementById('s1-res').innerText = v;
            document.getElementById('curr-stop-res').innerText = v;
        };

        document.getElementById('in-s2').oninput = (e) => document.getElementById('s2-res').innerText = e.target.value.toUpperCase();
        document.getElementById('in-s3').oninput = (e) => document.getElementById('s3-res').innerText = e.target.value.toUpperCase();
        document.getElementById('in-s4').oninput = (e) => document.getElementById('s4-res').innerText = e.target.value.toUpperCase();

        document.getElementById('in-transfers').oninput = (e) => {
            const container = document.getElementById('transfer-res');
            container.innerHTML = '';
            e.target.value.split(',').forEach(item => {
                const parts = item.trim().split(':');
                if (parts.length === 2) {
                    const box = document.createElement('div');
                    box.className = 'transfer-box';
                    box.innerText = parts[0].toUpperCase();
                    box.style.backgroundColor = parts[1].trim();
                    container.appendChild(box);
                }
            });
        };

        function save() {
            const target = mode.value === 'ext' ? extDiv : intDiv;
            html2canvas(target, { backgroundColor: null, scale: 2 }).then(canvas => {
                const link = document.createElement('a');
                link.download = `bkk_${mode.value}.png`;
                link.href = canvas.toDataURL();
                link.click();
            });
        }
    </script>
</body>
</html>
